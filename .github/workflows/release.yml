name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  # First job: determine the version
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      prev_version: ${{ steps.version.outputs.prev_version }}
    steps:
      - name: Get latest release version from GitHub API
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use GitHub API to get the latest release
          # gh release view exits non-zero if no releases exist
          LATEST_RELEASE=""
          if gh release view --repo ${{ github.repository }} --json tagName -q '.tagName' > /tmp/latest_tag 2>/dev/null; then
            LATEST_RELEASE=$(cat /tmp/latest_tag)
          fi
          echo "Latest release: '${LATEST_RELEASE}'"
          echo "prev_version=${LATEST_RELEASE}" >> $GITHUB_OUTPUT

          if [ -z "$LATEST_RELEASE" ] || ! echo "$LATEST_RELEASE" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            NEW_VERSION="v1.0.0"
          else
            VERSION=${LATEST_RELEASE#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi
          echo "New version: $NEW_VERSION"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

  # Build the native AOT binary
  build:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patch version in .csproj
        run: |
          VERSION=${{ needs.version.outputs.new_version }}
          VERSION=${VERSION#v}
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" src/GHelper.Linux.csproj
          echo "Updated .csproj version to: ${VERSION}"
          grep "<Version>" src/GHelper.Linux.csproj

      - name: Stamp version in udev rules
        run: |
          VERSION=${{ needs.version.outputs.new_version }}
          VERSION=${VERSION#v}
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" install/90-ghelper.rules
          echo "Updated udev rules version to: ${VERSION}"
          grep "# Version:" install/90-ghelper.rules

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Install Native AOT dependencies
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev libwayland-dev upx-ucl libpipewire-0.3-dev pkg-config

      - name: Restore packages
        run: dotnet restore src/ --runtime linux-x64

      - name: Build
        run: ./build.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghelper
          path: dist/ghelper

      - name: Upload udev rules artifact
        uses: actions/upload-artifact@v4
        with:
          name: udev-rules
          path: install/90-ghelper.rules

  # Build AppImage from compiled artifacts
  appimage:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ghelper
          path: artifacts/ghelper

      - name: Install libfuse2
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Download appimagetool
        run: |
          curl -fsSL "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o appimagetool
          chmod +x appimagetool

      - name: Assemble AppDir
        run: |
          mkdir -p GHelper.AppDir/usr/bin

          cp artifacts/ghelper/ghelper             GHelper.AppDir/usr/bin/
          chmod +x GHelper.AppDir/usr/bin/ghelper

          # Desktop entry at AppDir root (required by appimagetool)
          cp install/ghelper.desktop GHelper.AppDir/ghelper.desktop

          # Icon at AppDir root (must match Icon= in .desktop file)
          cp install/ghelper.png GHelper.AppDir/ghelper.png

          # AppRun entry point
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/bin/ghelper" "$@"\n' > GHelper.AppDir/AppRun
          chmod +x GHelper.AppDir/AppRun

      - name: Build AppImage
        run: |
          export ARCH=x86_64
          ./appimagetool GHelper.AppDir GHelper-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: GHelper-x86_64.AppImage

  # Create release with all artifacts
  release:
    needs: [version, build, appimage]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG="${{ needs.version.outputs.prev_version }}"
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | grep -iv '\[skip ci\]' || true)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -20 | grep -iv '\[skip ci\]' || true)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/ghelper/ghelper release/
          cp artifacts/appimage/GHelper-x86_64.AppImage release/
          cp artifacts/udev-rules/90-ghelper.rules release/
          chmod +x release/ghelper
          chmod +x release/GHelper-x86_64.AppImage
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          name: Release ${{ needs.version.outputs.new_version }}
          body: |
            ## G-Helper Linux ${{ needs.version.outputs.new_version }}

            ![ghelper Downloads](https://img.shields.io/github/downloads/utajum/g-helper-linux/${{ needs.version.outputs.new_version }}/ghelper?style=flat-square&label=ghelper%20downloads)
            ![AppImage Downloads](https://img.shields.io/github/downloads/utajum/g-helper-linux/${{ needs.version.outputs.new_version }}/GHelper-x86_64.AppImage?style=flat-square&label=appimage%20downloads)

            ### Commits
            ${{ steps.changelog.outputs.changelog }}

            ### Quick Install

            ```bash
            curl -sL https://raw.githubusercontent.com/${{ github.repository }}/master/install/install.sh | sudo bash
            ```

            ### Quick Uninstall

            ```bash
            curl -sL https://raw.githubusercontent.com/${{ github.repository }}/master/install/install.sh | sudo bash -s -- --uninstall
            ```

            Removes system files. User config in `~/.config/ghelper` is preserved.

            ### AppImage

            Download `GHelper-x86_64.AppImage`, make it executable, and run:

            ```bash
            chmod +x GHelper-x86_64.AppImage
            ./GHelper-x86_64.AppImage
            ```

            ### Manual Install

            Download `ghelper`, make it executable, and run:

            ```bash
            chmod +x ghelper
            ./ghelper
            ```

            > **Note:** udev rules are required for hardware access without root. The quick install script handles this automatically. For AppImage or manual installs:
            >
            > ```bash
            > sudo curl -sL https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.new_version }}/90-ghelper.rules -o /etc/udev/rules.d/90-ghelper.rules
            > sudo udevadm control --reload-rules && sudo udevadm trigger
            > ```

            ---
            *Auto-generated release from commit ${{ github.sha }}*
          files: |
            release/ghelper
            release/GHelper-x86_64.AppImage
            release/90-ghelper.rules
          generate_release_notes: true
