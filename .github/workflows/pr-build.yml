name: PR Build

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  actions: read

jobs:
  i18n:
    name: i18n consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate translation key parity
        run: ./scripts/i18n-check.sh

  csharp-tests:
    name: C# scenario tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Run GpuModeController scenarios
        run: dotnet run -c Debug --project tests/GHelper.Linux.Tests

  bash-tests:
    name: Boot script scenario tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ghelper-gpu-boot.sh scenarios
        run: bash install/tests/test-ghelper-gpu-boot.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patch version in .csproj
        run: |
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          VERSION="0.0.0-pr.${{ github.event.pull_request.number }}.${SHORT_SHA}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" src/GHelper.Linux.csproj
          echo "Set version to: ${VERSION}"

      - name: Stamp version in udev rules
        run: |
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          VERSION="0.0.0-pr.${{ github.event.pull_request.number }}.${SHORT_SHA}"
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" install/90-ghelper.rules
          echo "Updated udev rules version to: ${VERSION}"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Install Native AOT dependencies
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev libwayland-dev upx-ucl libpipewire-0.3-dev pkg-config

      - name: Restore packages
        run: dotnet restore src/ --runtime linux-x64

      - name: Build
        run: ./build.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghelper
          path: dist/ghelper
          retention-days: 7

      - name: Upload udev rules artifact
        uses: actions/upload-artifact@v4
        with:
          name: udev-rules
          path: install/90-ghelper.rules
          retention-days: 7

      - name: Upload GPU boot files artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-boot-files
          path: |
            install/ghelper-gpu-boot.sh
            install/ghelper-gpu-boot.service
          retention-days: 7

      - name: Save PR metadata
        run: |
          echo "${{ github.event.pull_request.number }}" > pr-meta.txt
          echo "${{ github.event.pull_request.head.sha }}" >> pr-meta.txt

      - name: Upload PR metadata
        uses: actions/upload-artifact@v4
        with:
          name: pr-meta
          path: pr-meta.txt
          retention-days: 7

  appimage:
    needs: [build, csharp-tests, bash-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ghelper
          path: artifacts/ghelper

      - name: Install libfuse2
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Download appimagetool
        run: |
          curl -fsSL "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o appimagetool
          chmod +x appimagetool

      - name: Assemble AppDir
        run: |
          mkdir -p GHelper.AppDir/usr/bin

          cp artifacts/ghelper/ghelper             GHelper.AppDir/usr/bin/
          chmod +x GHelper.AppDir/usr/bin/ghelper

          cp install/ghelper.desktop GHelper.AppDir/ghelper.desktop
          cp install/ghelper.png GHelper.AppDir/ghelper.png

          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/bin/ghelper" "$@"\n' > GHelper.AppDir/AppRun
          chmod +x GHelper.AppDir/AppRun

      - name: Build AppImage
        run: |
          export ARCH=x86_64
          ./appimagetool GHelper.AppDir GHelper-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: GHelper-x86_64.AppImage
          retention-days: 7
