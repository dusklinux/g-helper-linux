name: PR Comment

on:
  workflow_run:
    workflows: ["PR Build"]
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download PR metadata
        uses: actions/download-artifact@v4
        with:
          name: pr-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR metadata
        id: meta
        run: |
          pr_number=$(sed -n '1p' pr-meta.txt)
          head_sha=$(sed -n '2p' pr-meta.txt)
          if ! [[ "$pr_number" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid PR number: $pr_number"
            exit 1
          fi
          if ! [[ "$head_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid SHA: $head_sha"
            exit 1
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle artifacts
        run: |
          mkdir -p bundle
          cp artifacts/ghelper/ghelper                       bundle/
          cp artifacts/udev-rules/90-ghelper.rules           bundle/
          cp artifacts/gpu-boot-files/ghelper-gpu-boot.sh    bundle/
          cp artifacts/gpu-boot-files/ghelper-gpu-boot.service bundle/
          cp artifacts/appimage/GHelper-x86_64.AppImage      bundle/
          chmod +x bundle/ghelper bundle/GHelper-x86_64.AppImage bundle/ghelper-gpu-boot.sh

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: g-helper-linux-pr-${{ steps.meta.outputs.pr_number }}
          path: bundle/
          retention-days: 7

      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
          BUILD_RUN_ID: ${{ github.event.workflow_run.id }}
        with:
          script: |
            const prNum = parseInt(process.env.PR_NUMBER, 10);
            const sha = process.env.HEAD_SHA.substring(0, 7);
            const version = `0.0.0-pr.${prNum}.${sha}`;
            const runId = process.env.BUILD_RUN_ID;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const nightlyBase = `https://nightly.link/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const zipName = `g-helper-linux-pr-${prNum}`;

            const marker = '<!-- pr-build-artifacts -->';
            const body = [
              marker,
              `### Build Artifacts`,
              '',
              `Built from commit \`${sha}\` — version \`${version}\``,
              '',
              `**[Download ${zipName}.zip](${nightlyBase}/${zipName}.zip)**`,
              '',
              `> [View on GitHub Actions](${runUrl}) (requires login)`,
              '',
              '---',
              '',
              '**Contents:**',
              '',
              '| File | Description |',
              '|------|-------------|',
              '| `GHelper-x86_64.AppImage` | All-in-one AppImage (easiest to run) |',
              '| `ghelper` | Native AOT binary (self-contained, native libs embedded) |',
              '| `90-ghelper.rules` | Udev rules for hardware access without sudo |',
              '| `ghelper-gpu-boot.sh` | GPU mode boot script (applies Eco/Standard before display manager) |',
              '| `ghelper-gpu-boot.service` | Systemd service for GPU boot script |',
              '',
              '---',
              '',
              '**Quick test (download + extract):**',
              '```bash',
              `wget ${nightlyBase}/${zipName}.zip && unzip ${zipName}.zip -d ${zipName} && cd ${zipName}`,
              '```',
              '',
              '**Option A — AppImage (easiest):**',
              '```bash',
              'chmod +x GHelper-x86_64.AppImage',
              './GHelper-x86_64.AppImage',
              '```',
              '',
              '**Option B — Native binary:**',
              '```bash',
              'chmod +x ghelper',
              './ghelper',
              '```',
              '',
              '**Install udev rules (required for hardware access):**',
              '```bash',
              'sudo cp 90-ghelper.rules /etc/udev/rules.d/',
              'sudo udevadm control --reload-rules && sudo udevadm trigger',
              '```',
              '',
              '> **Note:** Without udev rules, ghelper needs `sudo` to access fan curves, performance modes, keyboard backlight, etc.',
              '',
              '**Install GPU boot service (required for GPU mode switching across reboots):**',
              '```bash',
              'sudo mkdir -p /usr/local/lib/ghelper',
              'sudo cp ghelper-gpu-boot.sh /usr/local/lib/ghelper/',
              'sudo chmod 755 /usr/local/lib/ghelper/ghelper-gpu-boot.sh',
              'sudo cp ghelper-gpu-boot.service /etc/systemd/system/',
              'sudo systemctl daemon-reload',
              'sudo systemctl enable ghelper-gpu-boot.service',
              '```',
              '',
              `> Artifacts expire in 7 days.`,
            ].join('\n');

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
              console.log('Created new comment');
            }
